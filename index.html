<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>漢字レーンゲーム - Stable Edition v1.3c</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: white; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #header-panel { height: 50px; background: #111; color: white; display: flex; justify-content: space-around; align-items: center; font-weight: bold; font-size: 1.1rem; z-index: 500; }
        #game-container { position: relative; flex-grow: 1; display: flex; background-color: white; border-bottom: 4px solid #000; overflow: hidden; }
        .lane { flex: 1; height: 100%; border-left: 2px solid #f0f0f0; position: relative; }
        .kanji { 
            position: absolute; width: 100%; text-align: center; font-size: 5.0rem; font-weight: 900; left: 0; top: 0;
            user-select: none; text-shadow: 3px 3px 0px white, -3px -3px 0px white, 3px -3px 0px white, -3px 3px 0px white, 0px 3px 0px white, 0px -3px 0px white, 3px 0px 0px white, -3px 0px 0px white; 
            display: inline-block; pointer-events: none; will-change: transform; transform: translateY(-200px); 
        }
        .kanji.black { color: #000; }
        .kanji.blue { color: #004dff; }
        .fly-left { transform: translate(-300px, 200px) rotate(-180deg) scale(0) !important; opacity: 0; transition: transform 0.25s ease-out, opacity 0.2s; }
        .fly-down { transform: translate(0, 400px) scale(0) !important; opacity: 0; transition: transform 0.25s ease-out, opacity 0.2s; }
        .fly-right { transform: translate(300px, 200px) rotate(180deg) scale(0) !important; opacity: 0; transition: transform 0.25s ease-out, opacity 0.2s; }
        #controls { height: 150px; display: flex; justify-content: space-around; align-items: center; background-color: #111; z-index: 200; }
        .btn { width: 95px; height: 95px; font-size: 2.8rem; background-color: #fff; border: 4px solid #444; border-radius: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #000; user-select: none; -webkit-tap-highlight-color: transparent; cursor: pointer; }
        .btn:active, .btn.active-demo { transform: translateY(4px); box-shadow: none; background-color: #eee; }
        #start-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .menu-btn { margin: 8px; padding: 15px 40px; font-size: 1.5rem; color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 260px; text-align: center; user-select: none; }
        #start-button { background: #ff4757; }
        #train-button { background: #3498db; }
        .sub-btn-container { display: flex; gap: 10px; margin-top: 20px; }
        .sub-btn { background: #2f3542; border: 1px solid #57606f; color: #aaa; font-size: 0.8rem; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        #level-select-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 1100; }
        .level-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 20px; }
        .lv-btn { width: 50px; height: 50px; background: #3498db; color: white; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; cursor: pointer; border: none; font-size: 1.2rem; }
        #best-score-display { margin-top: 20px; font-size: 1.2rem; color: #ffbc00; font-weight: bold; }
        #training-label { color: #3498db; font-size: 0.8rem; margin-left: 5px; }
    </style>
</head>
<body>

<div id="header-panel">
    <div>SCORE: <span id="score-val">0</span></div>
    <div>LV: <span id="level-val">1</span><span id="training-label" style="display:none;">(T)</span></div>
</div>

<div id="game-container">
    <div class="lane" id="lane-0"></div>
    <div class="lane" id="lane-1"></div>
    <div class="lane" id="lane-2"></div>
</div>

<div id="controls">
    <div id="ctrl-0" class="btn">←</div>
    <div id="ctrl-1" class="btn">↓</div>
    <div id="ctrl-2" class="btn">→</div>
</div>

<div id="start-overlay">
    <div style="font-size: 1.8rem; margin-bottom: 5px;">漢字レーンゲーム</div>
    <div id="best-score-display">BEST SCORE: 0</div>
    <div id="start-button" class="menu-btn">GAME START</div>
    <div id="train-button" class="menu-btn">TRAINING</div>
    <div class="sub-btn-container">
        <div id="demo-button" class="sub-btn">DEMO PLAY</div>
        <div id="reset-button" class="sub-btn">RESET BEST</div>
    </div>
</div>

<div id="level-select-overlay">
    <div style="font-size: 1.5rem; color: white;">SELECT TRAINING LEVEL</div>
    <div class="level-grid" id="lv-grid"></div>
    <div id="close-train-btn" class="sub-btn" style="margin-top: 30px;">BACK</div>
</div>

<script>
    let audioCtx = null;
    let gameActive = false;
    let isDemoMode = false;
    let isTrainingMode = false;
    let kanjis = [];
    let score = 0;
    let lvScore = 0; 
    let level = 1;
    let baseSpeed = 250; 
    let lastFrameTime = 0;

    const f = { C4:261, D4:293, E4:329, F4:349, G4:392, A4:440, B4:493, C5:523, D5:587, E5:659, G5:783 };
    const melodyPattern = [f.C5, 0, f.G4, 0, f.E4, 0, f.G4, 0, f.A4, f.B4, f.C5, 0, f.G4, 0, 0, 0, f.E5, f.D5, f.C5, 0, f.G4, 0, f.A4, 0, f.C5, 0, f.D5, 0, f.E5, 0, 0, 0, f.A4, 0, f.C5, 0, f.E5, 0, f.D5, 0, f.C5, 0, f.A4, 0, f.G4, 0, 0, 0, f.G5, 0, f.E5, 0, f.C5, 0, f.D5, 0, f.E5, f.F4, f.G5, 0, f.C5, 0, 0, 0];
    const bassPattern = [f.C4, f.G4, f.C4, f.G4, f.F4, f.C4, f.F4, f.C4, f.E4, f.B4, f.E4, f.B4, f.G4, f.D4, f.G4, f.D4];
    let bgmStep = 0;

    const container = document.getElementById('game-container');
    const lanes = document.querySelectorAll('.lane');
    const btns = [document.getElementById('ctrl-0'), document.getElementById('ctrl-1'), document.getElementById('ctrl-2')];

    function playTone(freq, type, duration, vol) {
        if (!audioCtx || audioCtx.state !== 'running') return;
        try {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function playBGMLoop() {
        if (!gameActive) return;
        let freq = melodyPattern[bgmStep % melodyPattern.length];
        if (freq > 0) playTone(freq, 'square', 0.18, 0.12);
        if (bgmStep % 2 === 0) {
            let bFreq = bassPattern[Math.floor(bgmStep / 2) % bassPattern.length];
            playTone(bFreq / 2, 'triangle', 0.25, 0.15);
        }
        bgmStep++;
        let tempo = Math.max(105, 170 - (level * 6));
        setTimeout(playBGMLoop, tempo);
    }

    function setDifficultyParams(lv) {
        if (lv <= 1) baseSpeed = 220;
        else if (lv === 2) baseSpeed = 300;
        else if (lv >= 3 && lv <= 9) baseSpeed = 420; 
        else baseSpeed = 550; 
    }

    function initGame(mode, startLv = 1) {
        if (gameActive) return;
        kanjis.forEach(k => k.element.remove());
        kanjis = [];
        score = 0;
        document.getElementById('score-val').innerText = score;
        isDemoMode = (mode === 'demo');
        isTrainingMode = (mode === 'train');
        level = startLv;
        lvScore = 0;
        setDifficultyParams(level);
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('level-select-overlay').style.display = 'none';
        document.getElementById('level-val').innerText = level;
        document.getElementById('training-label').style.display = isTrainingMode ? 'inline' : 'none';
        
        gameActive = true;
        lastFrameTime = 0; // update内でperformance.now()を取得させるために0に
        audioCtx.resume().then(() => {
            playTone(523, 'square', 0.1, 0.15);
            bgmStep = 0;
            playBGMLoop();
            spawnKanji();
            requestAnimationFrame(update);
        });
    }

    function spawnKanji() {
        if (!gameActive) return;
        const laneIndex = Math.floor(Math.random() * 3);
        const isBlue = Math.random() < 0.25;
        const type = Math.random() < 0.5 ? '左' : '右';
        const div = document.createElement('div');
        div.className = `kanji ${isBlue ? 'blue' : 'black'}`;
        div.innerText = type;
        lanes[laneIndex].appendChild(div);
        kanjis.push({ element: div, lane: laneIndex, type: type, isBlue: isBlue, y: -200, cleared: false });

        const rates = [1800, 1500, 1100, 950, 800, 650, 550, 450, 400, 350];
        let delay = rates[level - 1] || 350;
        let minInterval = 400; 
        if (level >= 9) minInterval = 320; 
        delay = Math.max(delay, minInterval);

        setTimeout(spawnKanji, delay);
    }

    function update(currentTime) {
        if (!gameActive) return;
        
        if (!lastFrameTime) {
            lastFrameTime = currentTime;
            requestAnimationFrame(update);
            return;
        }

        const deltaTime = (currentTime - lastFrameTime) / 1000; 
        lastFrameTime = currentTime;

        // deltaTimeが異常な場合は補正
        const safeDelta = Math.min(deltaTime, 0.1);

        const containerHeight = container.clientHeight;
        const hitLine = containerHeight - 130; 

        for (let i = 0; i < kanjis.length; i++) {
            const k = kanjis[i];
            if (k.cleared) continue;
            
            k.y += baseSpeed * safeDelta;
            k.element.style.transform = `translateY(${k.y}px)`;

            if (isDemoMode && k.y > hitLine) {
                let targetBtn = k.isBlue ? k.lane : (k.type === '左' ? 0 : 2);
                handleInput(targetBtn);
                btns[targetBtn].classList.add('active-demo');
                setTimeout(() => btns[targetBtn].classList.remove('active-demo'), 50);
            }
            if (k.y > containerHeight - 20) {
                gameOver();
                return;
            }
        }
        requestAnimationFrame(update);
    }

    function handleInput(btnIndex) {
        if (!gameActive) return;
        let target = null;
        let maxY = -999;
        for(let i=0; i<kanjis.length; i++) {
            if(!kanjis[i].cleared && kanjis[i].y > maxY) { maxY = kanjis[i].y; target = kanjis[i]; }
        }
        if (!target) return;
        let isCorrect = (target.isBlue && target.lane === btnIndex) || (!target.isBlue && target.type === '左' && btnIndex === 0) || (!target.isBlue && target.type === '右' && btnIndex === 2);
        if (isCorrect) {
            playTone(880, 'triangle', 0.08, 0.12);
            target.cleared = true;
            const directions = ['fly-left', 'fly-down', 'fly-right'];
            target.element.classList.add(directions[btnIndex]);
            score++;
            lvScore++;
            document.getElementById('score-val').innerText = score;
            if (level <= 2 && lvScore >= 10) {
                level++; lvScore = 0;
                setDifficultyParams(level);
                playTone(523, 'square', 0.1, 0.15);
                document.getElementById('level-val').innerText = level;
            }
        } else if (!isDemoMode) {
            gameOver();
        }
    }

    function gameOver() {
        gameActive = false;
        playTone(140, 'sawtooth', 0.4, 0.2);
        if (!isTrainingMode && !isDemoMode) {
            let currentBest = localStorage.getItem('kanjiGameBestScore') || 0;
            if (score > currentBest) localStorage.setItem('kanjiGameBestScore', score);
        }
        setTimeout(() => { 
            alert("GAME OVER\nSCORE: " + score); 
            location.reload(); 
        }, 150);
    }

    // イベントリスナーの登録
    document.getElementById('start-button').onclick = () => initGame('normal');
    document.getElementById('demo-button').onclick = () => initGame('demo');
    document.getElementById('reset-button').onclick = () => {
        if(confirm("ベストスコアをリセットしますか？")) {
            localStorage.removeItem('kanjiGameBestScore');
            location.reload();
        }
    };
    document.getElementById('train-button').onclick = () => {
        const grid = document.getElementById('lv-grid');
        grid.innerHTML = '';
        for(let i=1; i<=10; i++) {
            const b = document.createElement('button');
            b.className = 'lv-btn'; b.innerText = i;
            b.onclick = () => initGame('train', i);
            grid.appendChild(b);
        }
        document.getElementById('level-select-overlay').style.display = 'flex';
    };
    document.getElementById('close-train-btn').onclick = () => {
        document.getElementById('level-select-overlay').style.display = 'none';
    };

    btns.forEach((btn, i) => {
        const handler = (e) => { e.preventDefault(); if(!isDemoMode && gameActive) handleInput(i); };
        btn.onmousedown = handler; btn.ontouchstart = handler;
    });

    window.onload = () => {
        let best = localStorage.getItem('kanjiGameBestScore') || 0;
        document.getElementById('best-score-display').innerText = "BEST SCORE: " + best;
    };
</script>
</body>
</html>
